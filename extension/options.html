<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>readmemry — Options</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e7;
        --card: #fdfbf6;
        --ink: #382317;
        --muted: #7a6a5c;
        --primary: #b5502e;
        --border: #e2d8c8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 32px;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        max-width: 420px;
        margin: 0 auto;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 24px;
      }
      h1 {
        font-style: italic;
        color: var(--primary);
        margin-top: 0;
      }
      p.hint {
        color: var(--muted);
        font-size: 13px;
      }
      label {
        display: block;
        font-weight: 600;
        margin: 14px 0 4px;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font: inherit;
      }
      button {
        margin-top: 18px;
        padding: 9px 16px;
        border: none;
        border-radius: 6px;
        background: var(--primary);
        color: #fdfbf6;
        font-weight: 600;
        font: inherit;
        cursor: pointer;
      }
      #status {
        margin-top: 12px;
        font-size: 13px;
      }
      #status.success {
        color: #3d6b3d;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>readmemry</h1>
      <p class="hint">
        Generate an access token from your account's Settings page, then paste it below to
        connect this extension.
      </p>

      <form id="options-form">
        <label for="apiBaseUrl">App URL</label>
        <input id="apiBaseUrl" type="url" placeholder="https://your-app.vercel.app" required />

        <label for="accessToken">Access token</label>
        <input id="accessToken" type="text" placeholder="paste your token" required />

        <button type="submit">Save</button>
        <div id="status"></div>
      </form>
    </div>

    <script src="options.js"></script>
  </body>
</html>
