<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>readmemry</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e7;
        --card: #fdfbf6;
        --ink: #382317;
        --muted: #7a6a5c;
        --primary: #b5502e;
        --border: #e2d8c8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 64px 24px;
      }
      h1 {
        font-size: 22px;
        font-style: italic;
        color: var(--primary);
        text-align: center;
        margin: 0 0 32px;
      }
      #search {
        display: block;
        width: 100%;
        padding: 14px 18px;
        font-size: 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--card);
        color: var(--ink);
        font-family: inherit;
      }
      .columns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 32px;
        margin-top: 40px;
      }
      @media (max-width: 640px) {
        .columns {
          grid-template-columns: 1fr;
        }
      }
      h2 {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin: 0 0 12px;
      }
      .item {
        display: block;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        color: inherit;
        text-decoration: none;
      }
      .item:hover .item-title {
        text-decoration: underline;
      }
      .item-title {
        font-size: 14px;
        font-weight: 600;
      }
      .item-quote {
        font-size: 13px;
        color: var(--muted);
        margin-top: 2px;
      }
      .empty {
        font-size: 13px;
        color: var(--muted);
        padding: 8px 0;
      }
      #setup {
        display: none;
        text-align: center;
        padding: 60px 0;
      }
      #setup a {
        color: var(--primary);
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>readmemry</h1>

      <div id="setup">
        <p>Connect this extension to your account to see your library here.</p>
        <a href="#" id="open-options">Open options</a>
      </div>

      <div id="content" style="display: none">
        <input id="search" type="text" placeholder="Search your library…" autofocus />

        <div class="columns">
          <section>
            <h2>Recent links</h2>
            <div id="links-list"></div>
          </section>
          <section>
            <h2>Recent highlights</h2>
            <div id="highlights-list"></div>
          </section>
        </div>
      </div>
    </main>

    <script src="newtab.js"></script>
  </body>
</html>
